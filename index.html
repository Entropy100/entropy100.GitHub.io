<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            background: url('140981624_p0_master1200.jpg') center/cover fixed no-repeat;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
        }
        h1 {
            font-size: 4rem;
            color: #39FF14;
            text-shadow: 0 0 15px #39FF14, 0 0 30px rgba(57, 255, 20, 0.5);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }
        .subtitle {
            font-size: 1.15rem;
            color: #00BFFF;
            margin-bottom: 3.5rem;
            opacity: 0.9;
        }
        .links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link-btn {
            padding: 0.8rem 2.2rem;
            border: 2px solid #39FF14;
            color: #39FF14;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: 0.28s ease;
            background: transparent;
        }
        .link-btn:hover {
            background: #39FF14;
            color: #000;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
            transform: translateY(-3px);
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2.6rem;
            }
            .links {
                flex-direction: column;
                align-items: center;
            }
            .link-btn {
                width: 100%;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Entropy100</h1>
        <p class="subtitle">高中生 · 编程爱好者 · ACG玩家</p>
        <div class="links">
            <a href="https://github.com/Entropy100" class="link-btn">GitHub</a>
            <a href="https://space.bilibili.com/382994048" class="link-btn">B站</a>
            <a href="mailto:qqcooooooo@gmail.com" class="link-btn">Email</a>
        </div>
    </div>
</body>
</html>
