<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entropy</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, sans-serif;
    color: white;
    overflow-x: hidden;
}

.bg { z-index: -3; }
.stars { z-index: -2; }
.meteor-container { z-index: -1; } /* ☄️ 在背景上 */
.overlay { z-index: 0; }
.main-container { z-index: 1; } /* 文字在最上 */

/* 背景 */
.bg {
    position: fixed;
    inset: 0;
    background: url('140981624_p0_master1200.jpg') center/cover no-repeat;
}

/* 遮罩 */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

/* 星空 */
.stars, .meteor-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

/* 主体 */
.main-container {
    position: relative;
    max-width: 1200px;
    margin: auto;
    padding: 2rem;
}

/* 标题 */
h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    text-align: center;
    color: #39FF14;
}

/* 副标题 */
.subtitle {
    text-align: center;
    color: #00BFFF;
    margin-bottom: 2rem;
}

/* 网格 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
}

/* 卡片 */
.card {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(57,255,20,0.3);
    padding: 1.2rem;
    border-radius: 12px;
    backdrop-filter: blur(6px);
    transition: .3s;
}
.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 20px rgba(57,255,20,.3);
}

/* 技能 */
.skill {
    display: inline-block;
    margin: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid #00BFFF;
    color: #00BFFF;
    font-size: 0.8rem;
}

/* 按钮 */
.links {
    margin-top: 2rem;
    text-align: center;
}
.links a {
    display: inline-block;
    margin: .5rem;
    padding: .6rem 1.6rem;
    border: 1px solid #39FF14;
    border-radius: 999px;
    color: #39FF14;
    text-decoration: none;
}
.links a:hover {
    background: #39FF14;
    color: black;
}

/* ⭐ 星星 */
@keyframes twinkle {
    0%,100%{opacity:.3}
    50%{opacity:1}
}

/* 📱 强制横屏（稳定版） */
@media (max-width: 768px) and (orientation: portrait) {

    body {
        overflow: hidden;
    }

    .main-container {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vh;
        height: 100vw;
        transform: translate(-50%, -50%) rotate(90deg);
        overflow-y: auto;
    }

    .bg, .overlay, .stars, .meteor-container {
        width: 100vh;
        height: 100vw;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg);
    }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="stars"></div>
<div class="overlay"></div>
>

<div class="main-container">

    <h1>Entropy</h1>
    <p class="subtitle">高中生 · 编程爱好者 · ACG玩家</p>

    <div class="grid">

        <div class="card">
            <h3>精选项目</h3>
            <p>Termux 美化脚本</p>
            <p>一键配置初音绿主题终端</p>
            <br>
            <p>个人博客系统</p>
            <p>支持 Markdown 自动部署</p>
        </div>

        <div class="card">
            <h3>技能栈</h3>
            <span class="skill">Python</span>
            <span class="skill">HTML/CSS</span>
            <span class="skill">JavaScript</span>
            <span class="skill">Linux</span>
            <span class="skill">Termux</span>
            <span class="skill">Git</span>
            <span class="skill">逆向工程</span>
            <span class="skill">DNS</span>
        </div>

        <div class="card">
            <h3>关于我</h3>
            <p>
                热爱代码与二次元的高中生。<br>
                喜欢折腾技术，专注开发与终端美化。<br>
                相信代码可以创造无限可能。
            </p>
        </div>

    </div>

    <div class="links">
        <a href="https://github.com/Entropy100" target="_blank">GitHub</a>
        <a href="https://space.bilibili.com/382994048" target="_blank">B站</a>
        <a href="mailto:qqcooooooo@gmail.com">Email</a>
    </div>

</div>


</body>
</html>
